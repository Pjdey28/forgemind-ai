name: Deploy ForgeMind AI Service

on:
  push:
    branches:
      - main
    paths:
      - "ai/**"
      - ".github/workflows/main_forgemind-ai.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Archive AI Service
        run: |
          zip -r ../ai-service.zip . \
          -x ".venv/*" \
          -x "__pycache__/*" \
          -x "*.pyc"

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: forgemind-ai
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_2E2479968ED646D09BC1D8D3E1CCA652 }}
          package: ai-service.zip